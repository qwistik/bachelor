<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Аксесуари</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">Крамниця</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'product_list' %}">Товари</a></li>
                        <li class="nav-item"><a class="nav-link text-warning" href="{% url 'cart_detail' %}">🛒 Корзина</a></li>
                        <li class="nav-item"><span class="nav-link text-white">Привіт, {{ user.username }}!</span></li>
                        <li class="nav-item"><a class="nav-link text-danger" href="{% url 'logout' %}">Вийти</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Реєстрація</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
