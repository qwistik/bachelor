{% extends 'shop/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow p-4 mt-5">
            <h3 class="text-center mb-4">Вхід в систему</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }} <button type="submit" class="btn btn-primary w-100">Увійти</button>
            </form>
            <div class="mt-3 text-center">
                Немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
